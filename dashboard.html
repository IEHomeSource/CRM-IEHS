<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | IEHomeSource CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .section { display: none; } .section.active { display: flex; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        /* States dropdown look */
        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path fill="gray" d="M7 7l3-3 3 3m0 6l-3 3-3-3"/></svg>'); background-repeat: no-repeat; background-position: right 10px center; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans overflow-hidden">

    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#0f172a] text-slate-400 flex flex-col h-full border-r border-slate-800">
            <div class="p-6 text-lg font-bold text-white border-b border-slate-800">IEHomeSource</div>
            <nav class="flex-1 mt-4 px-3 space-y-1">
                <button onclick="window.showSection('Leads')" id="navLeads" class="sidebar-item active w-full flex items-center py-2 px-4 rounded hover:text-white transition text-sm">
                    <i class="fa fa-users w-5 mr-2"></i> Leads
                </button>
                <button onclick="window.showSection('Tasks')" id="navTasks" class="sidebar-item w-full flex items-center py-2 px-4 rounded hover:text-white transition text-sm">
                    <i class="fa fa-check-circle w-5 mr-2"></i> Tasks
                </button>
                <div id="dynamicTags" class="mt-8 space-y-1">
                    <p class="px-4 text-[10px] font-bold uppercase text-slate-500 mb-2">Smart Lists</p>
                </div>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="window.logout()" class="text-xs hover:text-white"><i class="fa fa-sign-out mr-2"></i>Logout</button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="flex-1 flex flex-col min-w-0 bg-white">
            <header class="h-14 border-b flex items-center justify-between px-6">
                <h2 id="viewTitle" class="text-sm font-bold uppercase tracking-widest text-slate-500">Leads Management</h2>
                <div class="flex gap-2">
                    <button onclick="window.openModal('leadModal')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm hover:bg-blue-700">+ Add Lead</button>
                </div>
            </header>

            <!-- SPLIT VIEW CONTAINER -->
            <div id="sectionLeads" class="section active flex-1 flex overflow-hidden">
                <!-- LEFT: LIST -->
                <div class="flex-1 overflow-y-auto border-r border-slate-100">
                    <div id="leadsListContainer" class="divide-y divide-slate-100">
                        <!-- Leads items will load here -->
                    </div>
                </div>

                <!-- RIGHT: DETAILS PANEL (Asana Style) -->
                <div id="detailsPanel" class="w-[450px] bg-slate-50 overflow-y-auto hidden">
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 class="font-bold text-lg text-blue-600">Lead Information</h3>
                            <button onclick="document.getElementById('detailsPanel').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fa fa-times"></i></button>
                        </div>
                        
                        <input type="hidden" id="eId">
                        <div class="space-y-4">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Name</label><input type="text" id="eName" class="w-full bg-transparent border-b border-slate-200 py-1 outline-none font-bold text-lg focus:border-blue-500"></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Phone</label><input type="text" id="ePhone" class="w-full bg-transparent border-b border-slate-200 py-1 outline-none font-mono"></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Email</label><input type="text" id="eEmail" class="w-full bg-transparent border-b border-slate-200 py-1 outline-none"></div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Status</label>
                                    <select id="eStatus" class="w-full bg-transparent border-b border-slate-200 py-1 outline-none">
                                        <option value="New">New</option>
                                        <option value="Negotiating">Negotiating</option>
                                        <option value="Closed">Closed</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">State</label>
                                    <select id="eState" class="w-full bg-transparent border-b border-slate-200 py-1 outline-none">
                                        <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option><option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option><option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option><option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option><option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option><option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option><option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option><option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option><option value="WI">WI</option><option value="WY">WY</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Tags (comma separated)</label><input type="text" id="eTags" class="w-full bg-transparent border-b border-slate-200 py-1 outline-none"></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Notes</label><textarea id="eNotes" class="w-full bg-white border border-slate-200 rounded p-3 mt-1 h-48 outline-none text-sm"></textarea></div>
                            <button id="updateLeadBtn" class="w-full bg-blue-600 text-white py-3 rounded font-bold shadow-lg hover:bg-blue-700 transition">Update Record</button>
                            <button onclick="window.deleteLead(document.getElementById('eId').value)" class="w-full text-red-500 text-xs font-bold py-2 mt-4 hover:underline">Delete Lead Permanently</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TASKS SECTION (SIMPLIFIED) -->
            <div id="sectionTasks" class="section flex-1 hidden flex-col p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold">Team Tasks</h3>
                    <button onclick="window.openModal('taskModal')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs">+ New Task</button>
                </div>
                <div id="tasksList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </main>
    </div>

    <!-- MODAL: ADD LEAD -->
    <div id="leadModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6">New Lead</h3>
            <div class="space-y-4">
                <input type="text" id="lName" placeholder="Name" class="w-full p-3 border rounded-xl outline-none">
                <input type="text" id="lPhone" placeholder="Phone" class="w-full p-3 border rounded-xl outline-none">
                <input type="email" id="lEmail" placeholder="Email" class="w-full p-3 border rounded-xl outline-none">
                <select id="lState" class="w-full p-3 border rounded-xl outline-none">
                    <option value="">Select State</option>
                    <option value="TX">TX</option><option value="FL">FL</option><option value="CA">CA</option><option value="NY">NY</option> <!-- Agrega los que uses más -->
                </select>
                <textarea id="lNotes" placeholder="Notes..." class="w-full p-3 border rounded-xl outline-none"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="window.closeModal('leadModal')" class="text-slate-500 font-bold">Cancel</button>
                <button id="saveLeadBtn" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD TASK -->
    <div id="taskModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">New Task</h3>
            <div class="space-y-4">
                <input type="text" id="tTitle" placeholder="What to do?" class="w-full p-3 border rounded-xl outline-none">
                <select id="tLeadId" class="w-full p-3 border rounded-xl outline-none"></select>
                <input type="date" id="tDate" class="w-full p-3 border rounded-xl outline-none">
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="window.closeModal('taskModal')" class="text-slate-500 font-bold">Cancel</button>
                <button id="saveTaskBtn" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
