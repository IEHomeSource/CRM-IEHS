<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEHomeSource CRM | GHL Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; color: #1e293b; }
        
        /* GHL Navigation Styles */
        .ghl-sidebar { width: 260px; background: #111827; height: 100vh; flex-shrink: 0; }
        .nav-item { color: #9ca3af; padding: 10px 16px; margin: 4px 12px; border-radius: 8px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; }
        .nav-item:hover { background: #1f2937; color: white; }
        .nav-item.active { background: #2563eb; color: white; }
        
        .section { display: none; height: calc(100vh - 64px); flex-direction: column; }
        .section.active { display: flex; }

        /* Kanban Column Style */
        .kanban-col { min-width: 340px; width: 340px; background: #f1f5f9; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Task styling */
        .task-card.completed { opacity: 0.6; }
        .task-card.completed h4 { text-decoration: line-through; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen w-full">
        <!-- SIDEBAR -->
        <aside class="ghl-sidebar flex flex-col shadow-2xl">
            <div class="p-6 flex items-center gap-3 border-b border-slate-800">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fa fa-house-user text-white text-xs"></i></div>
                <span class="text-white font-bold text-lg tracking-tight">Alpha CRM</span>
            </div>
            
            <nav class="flex-1 mt-6 overflow-y-auto">
                <p class="px-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Main Menu</p>
                <div id="navLeads" onclick="window.showSection('Leads')" class="nav-item active">
                    <i class="fa fa-columns"></i> Pipeline Board
                </div>
                <div id="navTasks" onclick="window.showSection('Tasks')" class="nav-item">
                    <i class="fa fa-check-square"></i> Tasks
                </div>
                <div id="navCalendar" onclick="window.showSection('Calendar')" class="nav-item">
                    <i class="fa fa-calendar-alt"></i> Appointments
                </div>

                <div class="mt-8">
                    <p class="px-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Smart Lists (Tags)</p>
                    <div id="navTagAll" onclick="window.filterByTag('all')" class="nav-item text-xs italic">
                        <i class="fa fa-tags"></i> # SHOW ALL
                    </div>
                    <div id="tagNavContainer">
                        <!-- Tags will be injected here as main menu items -->
                    </div>
                </div>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button onclick="window.logout()" class="nav-item w-[calc(100%-24px)] text-xs">
                    <i class="fa fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- HEADER -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 z-40">
                <div class="flex items-center gap-4">
                    <h2 id="viewTitle" class="text-lg font-bold text-slate-800 uppercase tracking-tight">Lead Pipeline</h2>
                    <div class="flex gap-4 ml-6 border-l pl-6 border-slate-200">
                        <div class="text-center"><p class="text-[10px] text-slate-400 uppercase font-bold">Leads</p><p id="statLeads" class="text-sm font-bold text-blue-600">0</p></div>
                        <div class="text-center"><p class="text-[10px] text-slate-400 uppercase font-bold">Tasks</p><p id="statTasks" class="text-sm font-bold text-orange-600">0</p></div>
                        <div class="text-center"><p class="text-[10px] text-slate-400 uppercase font-bold">Appts</p><p id="statAppts" class="text-sm font-bold text-emerald-600">0</p></div>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="searchInput" placeholder="Search leads..." class="pl-10 pr-4 py-2 bg-slate-100 rounded-full text-sm outline-none focus:ring-2 focus:ring-blue-500 w-64 border-none">
                    </div>
                    
                    <!-- Dynamic Action Buttons -->
                    <div id="actionButtons" class="flex gap-2">
                        <button id="btnNewLead" onclick="window.openModal('leadModal')" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition">
                            + New Lead
                        </button>
                        <button id="btnNewTask" onclick="window.openModal('taskModal')" class="bg-slate-800 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-black transition hidden">
                            + New Task
                        </button>
                        <button id="btnNewAppt" onclick="window.openModal('apptModal')" class="bg-emerald-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-emerald-700 transition hidden">
                            + New Appt
                        </button>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-hidden relative">
                <!-- SECTION: LEADS -->
                <section id="sectionLeads" class="section active overflow-x-auto p-6">
                    <div class="flex gap-6 h-full items-start">
                        <div class="kanban-col">
                            <div class="flex justify-between items-center mb-4"><h3 class="font-bold uppercase text-[11px] text-slate-500 tracking-widest">New Leads</h3><span id="countNew" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold">0</span></div>
                            <div id="colNew" class="flex-1 space-y-3 overflow-y-auto"></div>
                        </div>
                        <div class="kanban-col">
                            <div class="flex justify-between items-center mb-4"><h3 class="font-bold uppercase text-[11px] text-slate-500 tracking-widest">Negotiating</h3><span id="countNegotiating" class="bg-orange-100 text-orange-600 px-2 py-0.5 rounded text-[10px] font-bold">0</span></div>
                            <div id="colNegotiating" class="flex-1 space-y-3 overflow-y-auto"></div>
                        </div>
                        <div class="kanban-col">
                            <div class="flex justify-between items-center mb-4"><h3 class="font-bold uppercase text-[11px] text-slate-500 tracking-widest">Closed Won</h3><span id="countClosed" class="bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded text-[10px] font-bold">0</span></div>
                            <div id="colClosed" class="flex-1 space-y-3 overflow-y-auto"></div>
                        </div>
                    </div>
                </section>

                <!-- SECTION: TASKS -->
                <section id="sectionTasks" class="section p-8 overflow-y-auto bg-slate-50">
                    <div class="max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div>
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Pending Tasks</h3>
                            <div id="tasksList" class="space-y-3"></div>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Completed</h3>
                            <div id="tasksCompletedList" class="space-y-3 opacity-70"></div>
                        </div>
                    </div>
                </section>

                <!-- SECTION: CALENDAR -->
                <section id="sectionCalendar" class="section p-8 overflow-y-auto bg-slate-50">
                    <div id="apptsList" class="space-y-4 max-w-4xl mx-auto w-full"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- LEAD DETAIL PANEL -->
    <div id="detailsPanel" class="fixed inset-y-0 right-0 w-[500px] bg-white shadow-[-20px_0_40px_rgba(0,0,0,0.1)] z-[100] hidden overflow-y-auto border-l">
        <div class="p-8">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h3 class="font-bold text-xl uppercase tracking-tighter">Contact Record</h3>
                <button onclick="document.getElementById('detailsPanel').classList.add('hidden')" class="text-slate-400 hover:text-red-500"><i class="fa fa-times text-xl"></i></button>
            </div>
            <input type="hidden" id="eId">
            <div class="space-y-6 text-sm">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Full Name</label><input type="text" id="eName" class="w-full bg-slate-50 border p-3 rounded-lg outline-none font-bold text-lg focus:border-blue-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Phone</label><input type="text" id="ePhone" class="w-full bg-slate-50 border p-3 rounded-lg outline-none font-bold"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Email</label><input type="text" id="eEmail" class="w-full bg-slate-50 border p-3 rounded-lg outline-none"></div>
                </div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Address</label><input type="text" id="eAddress" class="w-full bg-slate-50 border p-3 rounded-lg outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">State</label>
                        <select id="eState" class="w-full bg-slate-50 border p-3 rounded-lg outline-none">
                            <option value="TX">TX</option><option value="FL">FL</option><option value="CA">CA</option><option value="NY">NY</option>
                        </select>
                    </div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Status</label>
                        <select id="eStatus" class="w-full bg-slate-50 border p-3 rounded-lg outline-none font-bold">
                            <option value="New">New Lead</option><option value="Negotiating">Negotiating</option><option value="Closed">Closed</option>
                        </select>
                    </div>
                </div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tags (comma separated)</label><input type="text" id="eTags" class="w-full bg-slate-50 border p-3 rounded-lg outline-none text-blue-600 font-bold uppercase text-xs"></div>
                <div class="bg-slate-100 p-6 rounded-2xl border">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-4 italic">Activity & Notes</label>
                    <textarea id="newNote" placeholder="Update lead..." class="w-full p-4 bg-white border rounded-xl h-24 mb-4 outline-none text-sm"></textarea>
                    <button onclick="window.addNote()" class="bg-blue-600 text-white w-full py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Post Note</button>
                    <div id="notesHistory" class="mt-6 space-y-4 divide-y divide-slate-200"></div>
                </div>
                <button onclick="window.saveLeadUpdates()" class="bg-slate-900 text-white w-full py-4 rounded-xl font-bold shadow-lg hover:bg-black transition">SAVE ALL CHANGES</button>
                <button onclick="window.deleteItem('leads', document.getElementById('eId').value)" class="text-red-500 w-full text-[10px] font-bold uppercase py-4 hover:underline">Delete Contact</button>
            </div>
        </div>
    </div>

    <!-- MODALES -->
    <div id="leadModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center hidden z-[110] p-4">
        <div class="bg-white p-10 rounded-3xl w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-bold mb-6 uppercase tracking-tight">New Contact</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                <input type="text" id="lName" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2 focus:ring-blue-500">
                <input type="text" id="lPhone" placeholder="Phone" class="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2 focus:ring-blue-500 font-bold">
                <input type="email" id="lEmail" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2 focus:ring-blue-500">
                <input type="text" id="lAddress" placeholder="Street Address" class="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2 focus:ring-blue-500">
                <select id="lState" class="w-full p-4 bg-slate-50 rounded-xl outline-none border">
                    <option value="TX">TX</option><option value="FL">FL</option><option value="CA">CA</option>
                </select>
                <textarea id="lNotes" placeholder="Initial Notes..." class="md:col-span-2 w-full p-4 bg-slate-50 rounded-xl outline-none border h-24"></textarea>
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button onclick="window.closeModal('leadModal')" class="font-bold text-slate-400 uppercase">Cancel</button>
                <button id="saveLeadBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Create Contact</button>
            </div>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center hidden z-[110] p-4">
        <div class="bg-white p-10 rounded-3xl w-full max-w-md shadow-2xl">
            <h3 id="taskTitleHeader" class="text-xl font-bold mb-6 uppercase tracking-widest">Task Detail</h3>
            <input type="hidden" id="tEditId">
            <div class="space-y-4">
                <input type="text" id="tTitle" placeholder="Task description..." class="w-full p-4 bg-slate-50 rounded-xl border outline-none">
                <select id="tPriority" class="w-full p-4 bg-slate-50 rounded-xl border outline-none">
                    <option value="Low">Low</option><option value="Medium" selected>Medium</option><option value="High">High 🔥</option>
                </select>
                <select id="tLeadId" class="w-full p-4 bg-slate-50 rounded-xl bord
