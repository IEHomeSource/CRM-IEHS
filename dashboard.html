<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GHL Clone | Real Estate CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#0f172a] text-slate-400 flex flex-col h-full">
            <div class="p-6 text-xl font-bold text-white border-b border-slate-800">CRM ALPHA</div>
            <nav class="flex-1 mt-4 px-2">
                <button onclick="filterByTag('all')" class="sidebar-item active w-full flex items-center py-2 px-4 rounded-lg hover:text-white">
                    <i class="fa fa-users w-6"></i> All Leads
                </button>
                <div id="tagsListNav" class="mt-4">
                    <p class="px-4 text-[10px] font-bold uppercase text-slate-500 mb-2">Filter by Tags</p>
                    <!-- Tags will appear here dynamically -->
                </div>
            </nav>
            <div class="p-4"><button id="logoutBtn" class="text-sm hover:text-white"><i class="fa fa-sign-out"></i> Logout</button></div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8">
                <h2 id="viewTitle" class="text-lg font-bold">All Leads</h2>
                <button onclick="openModal('leadModal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg shadow-blue-200 hover:bg-blue-700">+ New Lead</button>
            </header>

            <div class="p-8">
                <!-- TABLE -->
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] uppercase font-bold text-slate-500">
                            <tr>
                                <th class="p-4">Lead Info</th>
                                <th class="p-4">Location</th>
                                <th class="p-4">Phone</th>
                                <th class="p-4">Tags</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="leadsTableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL: ADD LEAD (GHL Detailed Form) -->
    <div id="leadModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-2xl shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Create New Contact</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="lName" placeholder="Full Name" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="email" id="lEmail" placeholder="Email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="lPhone" placeholder="Phone Number (Unique)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="lAddress" placeholder="Address" class="w-full p-3 border rounded-xl">
                <input type="text" id="lCity" placeholder="City" class="w-full p-3 border rounded-xl">
                <input type="text" id="lState" placeholder="State" class="w-full p-3 border rounded-xl">
                <input type="text" id="lZip" placeholder="Zip Code" class="w-full p-3 border rounded-xl">
                <input type="text" id="lTags" placeholder="Tags (comma separated)" class="w-full p-3 border rounded-xl">
                <textarea id="lNotes" placeholder="Notes..." class="w-full p-3 border rounded-xl col-span-2"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('leadModal')" class="text-slate-500 font-bold">Cancel</button>
                <button id="saveLeadBtn" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">Save Contact</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
