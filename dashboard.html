<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IEHomeSource CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .section { display: none; }
        .section.active { display: block; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR (GHL NAVY STYLE) -->
        <aside class="w-64 bg-[#0f172a] text-slate-400 flex flex-col h-full shadow-2xl">
            <div class="p-6 text-lg font-bold text-white border-b border-slate-800 flex items-center gap-2">
                <i class="fa fa-house-chimney text-blue-500"></i> IEHomeSource
            </div>
            <nav class="flex-1 mt-4 px-3 space-y-1">
                <p class="text-[10px] font-bold text-slate-500 px-3 uppercase mb-2 tracking-widest">Main Menu</p>
                <button onclick="showSection('Leads')" id="navLeads" class="sidebar-item active w-full flex items-center py-2.5 px-4 rounded-lg hover:text-white transition text-sm">
                    <i class="fa fa-users w-5 mr-3"></i> Leads
                </button>
                <button onclick="showSection('Tasks')" id="navTasks" class="sidebar-item w-full flex items-center py-2.5 px-4 rounded-lg hover:text-white transition text-sm">
                    <i class="fa fa-list-check w-5 mr-3"></i> Tasks
                </button>
                
                <div id="tagsListNav" class="mt-8 border-t border-slate-800 pt-4">
                    <p class="px-3 text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest">Smart Lists (Tags)</p>
                    <button onclick="filterByTag('all')" class="w-full text-left py-2 px-4 text-[12px] hover:text-white transition">Show All Leads</button>
                    <!-- Tags dynamic list -->
                </div>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button id="logoutBtn" class="flex items-center gap-2 text-sm hover:text-white"><i class="fa fa-sign-out"></i> Logout</button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 sticky top-0 z-10 shadow-sm">
                <h2 id="viewTitle" class="text-lg font-bold text-slate-700 uppercase tracking-tight">All Leads</h2>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i class="fa fa-search absolute left-3 top-3 text-slate-400 text-xs"></i>
                        <input type="text" id="searchInput" placeholder="Search contact..." class="pl-9 pr-4 py-2 bg-slate-100 border-none rounded-lg text-xs outline-none w-48 focus:w-64 transition-all">
                    </div>
                    <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
                    <button onclick="document.getElementById('csvFileInput').click()" class="bg-white border border-emerald-200 text-emerald-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-50 transition">
                        <i class="fa fa-file-import mr-1 text-emerald-500"></i> Import
                    </button>
                    <button onclick="openModal('leadModal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg hover:bg-blue-700 transition">
                        + New Lead
                    </button>
                </div>
            </header>

            <div class="p-8">
                <!-- KPI CARDS -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Total Contacts</p>
                        <h3 class="text-3xl font-bold mt-1" id="totalCount">0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Pending Tasks</p>
                        <h3 class="text-3xl font-bold mt-1" id="taskCountDisplay">0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Closed Deals</p>
                        <h3 class="text-3xl font-bold mt-1 text-emerald-600" id="closedCount">0</h3>
                    </div>
                </div>

                <!-- LEADS SECTION -->
                <section id="sectionLeads" class="section active">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b text-[10px] uppercase font-bold text-slate-400">
                                <tr>
                                    <th class="p-4">Lead Info</th>
                                    <th class="p-4">Phone</th>
                                    <th class="p-4">Location</th>
                                    <th class="p-4">Tags</th>
                                    <th class="p-4 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="leadsTableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </section>

                <!-- TASKS SECTION -->
                <section id="sectionTasks" class="section">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold uppercase tracking-tight">Team Assignments</h3>
                        <button onclick="openModal('taskModal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">+ New Task</button>
                    </div>
                    <div id="tasksList" class="grid grid-cols-1 gap-3">
                        <!-- Tasks go here -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- MODAL: CREATE LEAD -->
    <div id="leadModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold mb-6">Create New Contact</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="lName" placeholder="Full Name" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="email" id="lEmail" placeholder="Email" class="w-full p-3 border rounded-xl outline-none">
                <input type="text" id="lPhone" placeholder="Phone Number" class="w-full p-3 border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                <input type="text" id="lAddress" placeholder="Address" class="w-full p-3 border rounded-xl outline-none">
                <input type="text" id="lCity" placeholder="City" class="w-full p-3 border rounded-xl">
                <input type="text" id="lState" placeholder="State" class="w-full p-3 border rounded-xl">
                <input type="text" id="lZip" placeholder="Zip Code" class="w-full p-3 border rounded-xl">
                <select id="lStatus" class="w-full p-3 border rounded-xl">
                    <option value="New">New Lead</option>
                    <option value="Negotiating">Negotiating</option>
                    <option value="Closed">Closed Deal</option>
                </select>
                <input type="text" id="lTags" placeholder="Tags (e.g. Investor, Urgent)" class="w-full p-3 border rounded-xl col-span-2">
                <textarea id="lNotes" placeholder="Motivation & Notes..." class="w-full p-3 border rounded-xl col-span-2 h-24"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('leadModal')" class="px-6 py-2 text-slate-500 font-bold">Cancel</button>
                <button id="saveLeadBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Save Contact</button>
            </div>
        </div>
    </div>

    <!-- MODAL: CREATE TASK -->
    <div id="taskModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Assign New Task</h3>
            <div class="space-y-4">
                <input type="text" id="tTitle" placeholder="What needs to be done?" class="w-full p-3 border rounded-xl outline-none">
                <select id="tLeadId" class="w-full p-3 border rounded-xl outline-none">
                    <option value="">Link to Lead (Optional)</option>
                    <!-- Leads will load here -->
                </select>
                <input type="date" id="tDate" class="w-full p-3 border rounded-xl outline-none">
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('taskModal')" class="px-6 py-2 text-slate-500 font-bold">Cancel</button>
                <button id="saveTaskBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Create Task</button>
            </div>
        </div>
    </div>

    <!-- MODAL: LEAD DETAIL VIEW (THE "GHL" PANEL) -->
    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-blue-600">Contact Details</h3>
                <button onclick="closeModal('detailModal')" class="text-slate-400"><i class="fa fa-times text-xl"></i></button>
            </div>
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="text-[10px] font-bold text-slate-400">NAME</label><input type="text" id="eName" class="w-full p-2 border-b"></div>
                <div><label class="text-[10px] font-bold text-slate-400">PHONE</label><input type="text" id="ePhone" class="w-full p-2 border-b font-bold"></div>
                <div><label class="text-[10px] font-bold text-slate-400">EMAIL</label><input type="text" id="eEmail" class="w-full p-2 border-b"></div>
                <div><label class="text-[10px] font-bold text-slate-400">STATUS</label><select id="eStatus" class="w-full p-2 border-b"><option value="New">New</option><option value="Negotiating">Negotiating</option><option value="Closed">Closed</option></select></div>
                <div class="col-span-2"><label class="text-[10px] font-bold text-slate-400">TAGS</label><input type="text" id="eTags" class="w-full p-2 border-b"></div>
                <div class="col-span-2"><label class="text-[10px] font-bold text-slate-400">NOTES</label><textarea id="eNotes" class="w-full p-3 border rounded-xl h-32"></textarea></div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button id="updateLeadBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700">Update Lead Info</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="app.js"></script>
    <script>
        // Global Modal Logic
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Sidebar Navigation
        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('section' + name).classList.add('active');
            document.getElementById('nav' + name).classList.add('active');
            document.getElementById('viewTitle').innerText = name + " Management";
        }
    </script>
</body>
</html>
