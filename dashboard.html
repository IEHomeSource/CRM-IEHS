<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IEHomeSource CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .section { display: none; height: calc(100vh - 64px); } 
        .section.active { display: flex; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans overflow-hidden">

    <div class="flex h-screen">
        <!-- SIDEBAR (Navegación Izquierda) -->
        <aside class="w-64 bg-[#0f172a] text-slate-400 flex flex-col h-full border-r border-slate-800 z-20">
            <div class="p-6 text-lg font-bold text-white border-b border-slate-800 flex items-center gap-2">
                <i class="fa fa-house-chimney text-blue-500"></i> IEHomeSource
            </div>
            <nav class="flex-1 mt-4 px-3 space-y-1">
                <button onclick="window.showSection('Leads')" id="navLeads" class="sidebar-item active w-full flex items-center py-3 px-4 rounded hover:text-white transition text-sm">
                    <i class="fa fa-users w-5 mr-3"></i> Leads & Pipeline
                </button>
                <button onclick="window.showSection('Tasks')" id="navTasks" class="sidebar-item w-full flex items-center py-3 px-4 rounded hover:text-white transition text-sm">
                    <i class="fa fa-check-circle w-5 mr-3"></i> Tasks & To-Do
                </button>
                <button onclick="window.showSection('Calendar')" id="navCalendar" class="sidebar-item w-full flex items-center py-3 px-4 rounded hover:text-white transition text-sm">
                    <i class="fa fa-calendar-alt w-5 mr-3"></i> Appointments
                </button>
                
                <div id="dynamicTags" class="mt-8 pt-4 border-t border-slate-800">
                    <p class="px-4 text-[10px] font-bold uppercase text-slate-500 mb-2 tracking-widest">Smart Lists</p>
                    <button onclick="window.filterByTag('all')" class="w-full text-left py-1.5 px-4 text-[11px] hover:text-white transition italic"># Show All</button>
                    <div id="tagListContainer" class="space-y-1"></div>
                </div>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="window.logout()" class="text-xs hover:text-white transition flex items-center gap-2">
                    <i class="fa fa-sign-out"></i> Logout
                </button>
            </div>
        </aside>

        <!-- AREA PRINCIPAL (Derecha) -->
        <div class="flex-1 flex flex-col min-w-0 bg-white">
            
            <!-- HEADER GLOBAL -->
            <header class="h-16 border-b flex items-center justify-between px-6 bg-white z-10">
                <div class="flex items-center gap-4">
                    <h2 id="viewTitle" class="text-xs font-bold uppercase tracking-widest text-slate-500">Leads</h2>
                    <div id="leadFilters" class="flex gap-1">
                        <button onclick="window.filterStatus('all')" class="text-[9px] px-2 py-1 rounded bg-slate-100 font-bold hover:bg-slate-200 uppercase">All</button>
                        <button onclick="window.filterStatus('New')" class="text-[9px] px-2 py-1 rounded bg-blue-50 text-blue-600 font-bold hover:bg-blue-100 uppercase">New</button>
                        <button onclick="window.filterStatus('Closed')" class="text-[9px] px-2 py-1 rounded bg-emerald-50 text-emerald-600 font-bold hover:bg-emerald-100 uppercase">Closed</button>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="relative" id="searchContainer">
                        <i class="fa fa-search absolute left-3 top-2.5 text-slate-300 text-xs"></i>
                        <input type="text" id="searchInput" placeholder="Search contact..." class="pl-8 pr-4 py-1.5 bg-slate-50 border rounded text-xs outline-none w-48 focus:w-64 transition-all">
                    </div>
                    <!-- Botón dinámico que cambia según la sección -->
                    <button id="mainActionButton" onclick="window.openModal('leadModal')" class="bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold shadow-lg hover:bg-blue-700 transition">
                        + New Lead
                    </button>
                </div>
            </header>

            <!-- CONTENEDOR DINÁMICO DE SECCIONES -->
            <div class="flex-1 relative">
                
                <!-- SECCIÓN LEADS (Vista Dividida Estilo Asana) -->
                <section id="sectionLeads" class="section active flex w-full">
                    <!-- Lista de Leads -->
                    <div class="flex-1 overflow-y-auto border-r border-slate-100 bg-white">
                        <div id="leadsListContainer" class="divide-y divide-slate-50"></div>
                    </div>
                    <!-- Panel de Detalles (Solo se abre al hacer clic en un lead) -->
                    <div id="detailsPanel" class="w-[500px] bg-slate-50 overflow-y-auto hidden border-l shadow-xl">
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-6">
                                <span id="labelStatus" class="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-600 text-white uppercase">New Lead</span>
                                <button onclick="document.getElementById('detailsPanel').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fa fa-times"></i></button>
                            </div>
                            <input type="hidden" id="eId">
                            <input type="text" id="eName" class="w-full bg-transparent text-2xl font-bold border-none outline-none focus:ring-0 mb-6" placeholder="Lead Name">
                            
                            <!-- Tabs de la ficha -->
                            <div class="flex gap-4 border-b border-slate-200 mb-6">
                                <button onclick="window.showTab('info')" id="tabInfo" class="tab-btn active pb-2 text-[10px] uppercase tracking-wider text-slate-400">Information</button>
                                <button onclick="window.showTab('notes')" id="tabNotes" class="tab-btn pb-2 text-[10px] uppercase tracking-wider text-slate-400">Activity Log</button>
                            </div>

                            <div id="contentInfo" class="space-y-6">
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">Phone</label><input type="text" id="ePhone" class="w-full bg-transparent border-b py-1 outline-none text-sm font-mono font-bold"></div>
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">Email</label><input type="text" id="eEmail" class="w-full bg-transparent border-b py-1 outline-none text-sm"></div>
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-400 uppercase">State</label>
                                        <select id="eState" class="w-full bg-transparent border-b py-1 outline-none text-sm">
                                            <option value="TX">TX</option><option value="FL">FL</option><option value="CA">CA</option><option value="GA">GA</option><option value="NY">NY</option>
                                        </select>
                                    </div>
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">Zip Code</label><input type="text" id="eZip" class="w-full bg-transparent border-b py-1 outline-none text-sm"></div>
                                </div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Tags (comma separated)</label><input type="text" id="eTags" class="w-full bg-transparent border-b py-1 outline-none text-xs text-blue-600 font-bold"></div>
                                <button onclick="window.saveLeadUpdates()" class="w-full bg-slate-900 text-white py-3 rounded font-bold text-sm shadow-xl hover:bg-black transition">Update Lead</button>
                                <button onclick="window.deleteItem('leads', document.getElementById('eId').value)" class="w-full text-red-500 text-[9px] font-bold uppercase mt-8 hover:underline italic">Delete Permanently</button>
                            </div>

                            <div id="contentNotes" class="hidden space-y-4">
                                <textarea id="newNote" placeholder="Write an update..." class="w-full p-3 border rounded-xl text-sm outline-none h-24 bg-white shadow-inner"></textarea>
                                <button onclick="window.addNote()" class="w-full bg-blue-600 text-white py-2 rounded font-bold text-xs uppercase tracking-widest">Post Note</button>
                                <div id="notesHistory" class="space-y-4 pt-4 divide-y divide-slate-100"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- SECCIÓN TAREAS (Ocupa todo el ancho) -->
                <section id="sectionTasks" class="section w-full flex-col p-8 overflow-y-auto bg-slate-50">
                    <div id="tasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </section>

                <!-- SECCIÓN CALENDARIO / CITAS -->
                <section id="sectionCalendar" class="section w-full flex-col p-8 overflow-y-auto bg-slate-50">
                    <div id="apptsList" class="space-y-3 max-w-3xl mx-auto w-full"></div>
                </section>

            </div>
        </div>
    </div>

    <!-- MODALES (Ocultos) -->
    <!-- Modal Lead -->
    <div id="leadModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6 italic uppercase tracking-tighter">New Lead Contact</h3>
            <div class="space-y-4">
                <input type="text" id="lName" placeholder="Full Name" class="w-full p-3 border rounded-xl outline-none">
                <input type="text" id="lPhone" placeholder="Phone Number" class="w-full p-3 border rounded-xl font-bold outline-none border-blue-100">
                <select id="lState" class="w-full p-3 border rounded-xl bg-slate-50"><option value="TX">Texas (TX)</option><option value="FL">Florida (FL)</option><option value="CA">California (CA)</option></select>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="window.closeModal('leadModal')" class="text-xs font-bold text-slate-400">CANCEL</button>
                <button id="saveLeadBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs shadow-lg">CREATE CONTACT</button>
            </div>
        </div>
    </div>

    <!-- Modal Task -->
    <div id="taskModal" class="fixed inset-0 bg-slate-900/70 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6">New Task</h3>
            <div class="space-y-4">
                <input type="text" id="tTitle" placeholder="Task title..." class="w-full p-3 border rounded">
                <select id="tPriority" class="w-full p-3 border rounded"><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High Priority 🔥</option></select>
                <select id="tLeadId" class="w-full p-3 border rounded bg-slate-50"></select>
                <input type="date" id="tDate" class="w-full p-3 border rounded">
            </div>
            <div class="flex justify-end gap-3 mt-6"><button onclick="window.closeModal('taskModal')" class="text-xs font-bold">CANCEL</button><button id="saveTaskBtn" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">SAVE TASK</button></div>
        </div>
    </div>

    <!-- Modal Appointment -->
    <div id="apptModal" class="fixed inset-0 bg-slate-900/70 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Schedule Meeting</h3>
            <div class="space-y-4">
                <input type="text" id="aTitle" placeholder="Meeting purpose..." class="w-full p-3 border rounded">
                <select id="aLeadId" class="w-full p-3 border rounded bg-slate-50"></select>
                <input type="datetime-local" id="aDate" class="w-full p-3 border rounded">
            </div>
            <div class="flex justify-end gap-3 mt-6"><button onclick="window.closeModal('apptModal')" class="text-xs font-bold">CANCEL</button><button id="saveApptBtn" class="bg-emerald-600 text-white px-6 py-2 rounded font-bold">SCHEDULE</button></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
