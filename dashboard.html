<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IEHomeSource CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .section { display: none; height: calc(100vh - 64px); flex-direction: column; }
        .section.active { display: flex; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .status-tab.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#0f172a] text-slate-400 flex flex-col h-full z-50">
            <div class="p-6 text-xl font-bold text-white border-b border-slate-800 flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fa fa-house-user text-white text-xs"></i></div>
                IEHomeSource
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <button onclick="window.showSection('Leads')" id="navLeads" class="sidebar-item active w-full flex items-center py-3 px-4 rounded-xl hover:text-white transition font-medium text-sm">
                    <i class="fa fa-users w-6"></i> Leads
                </button>
                <button onclick="window.showSection('Tasks')" id="navTasks" class="sidebar-item w-full flex items-center py-3 px-4 rounded-xl hover:text-white transition font-medium text-sm">
                    <i class="fa fa-tasks w-6 text-lg"></i> Tasks
                </button>
                <button onclick="window.showSection('Calendar')" id="navCalendar" class="sidebar-item w-full flex items-center py-3 px-4 rounded-xl hover:text-white transition font-medium text-sm">
                    <i class="fa fa-calendar-alt w-6"></i> Appointments
                </button>
                <div class="mt-10 pt-6 border-t border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mb-4 italic text-center">Smart Lists</p>
                    <div id="tagNav" class="space-y-1"></div>
                </div>
            </nav>
            <div class="p-6 border-t border-slate-800">
                <button onclick="window.logout()" class="text-xs font-bold hover:text-white transition uppercase tracking-widest flex items-center gap-2">
                    <i class="fa fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 z-40 shadow-sm">
                <div class="relative w-96">
                    <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="searchInput" placeholder="Search contacts..." class="w-full pl-12 pr-4 py-2 bg-slate-50 border-none rounded-full text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-center gap-4">
                    <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
                    <button onclick="document.getElementById('csvFileInput').click()" class="text-slate-400 hover:text-emerald-600 transition p-2"><i class="fa fa-file-excel text-xl"></i></button>
                    <button id="headerMainBtn" onclick="window.openModal('leadModal')" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition">
                        + New Lead
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-hidden relative">
                <!-- SECTION LEADS -->
                <section id="sectionLeads" class="section active flex-col">
                    <div class="p-8 pb-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Total Leads</p>
                            <h3 class="text-4xl font-bold text-slate-800 mt-2" id="statLeads">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Active Tasks</p>
                            <h3 class="text-4xl font-bold text-blue-600 mt-2" id="statTasks">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Appointments</p>
                            <h3 class="text-4xl font-bold text-emerald-600 mt-2" id="statAppts">0</h3>
                        </div>
                    </div>

                    <div class="px-8 py-2 border-b flex gap-6 text-sm bg-white border-slate-100">
                        <button onclick="window.filterStatus('all')" class="status-tab active pb-2">All Contacts</button>
                        <button onclick="window.filterStatus('New')" class="status-tab pb-2">New Leads</button>
                        <button onclick="window.filterStatus('Closed')" class="status-tab pb-2">Closed</button>
                    </div>

                    <div class="flex-1 flex overflow-hidden">
                        <div class="flex-1 overflow-y-auto bg-white border-r border-slate-100">
                            <div id="leadsList" class="divide-y divide-slate-50"></div>
                        </div>
                        <!-- LEAD DETAIL PANEL -->
                        <div id="detailsPanel" class="w-[500px] bg-slate-50 border-l overflow-y-auto hidden">
                            <div class="p-8">
                                <div class="flex justify-between items-center mb-8 border-b pb-4">
                                    <h3 class="font-bold text-xl uppercase tracking-tighter">Contact Detail</h3>
                                    <button onclick="document.getElementById('detailsPanel').classList.add('hidden')" class="text-slate-400"><i class="fa fa-times text-xl"></i></button>
                                </div>
                                <input type="hidden" id="eId">
                                <div class="space-y-6">
                                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">Full Name</label><input type="text" id="eName" class="w-full bg-transparent border-b py-2 outline-none font-bold text-xl"></div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Phone</label><input type="text" id="ePhone" class="w-full bg-transparent border-b py-2 outline-none font-bold font-mono"></div>
                                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Email</label><input type="text" id="eEmail" class="w-full bg-transparent border-b py-2 outline-none"></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">State</label>
                                            <select id="eState" class="w-full bg-transparent border-b py-2 outline-none">
                                                <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option><option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option><option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option><option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option><option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option><option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option><option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option><option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option><option value="WI">WI</option><option value="WY">WY</option>
                                            </select>
                                        </div>
                                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Status</label>
                                            <select id="eStatus" class="w-full bg-transparent border-b py-2 outline-none">
                                                <option value="New">New Lead</option><option value="Negotiating">Negotiating</option><option value="Closed">Closed</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button onclick="window.saveLeadUpdates()" class="bg-blue-600 text-white w-full py-4 rounded-2xl font-bold shadow-lg">Save Record</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="sectionTasks" class="section flex-col p-10 overflow-y-auto bg-slate-50">
                    <div id="tasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto w-full"></div>
                </section>

                <section id="sectionCalendar" class="section flex-col p-10 overflow-y-auto bg-slate-50">
                    <div id="apptsList" class="space-y-4 max-w-3xl mx-auto w-full"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- MODAL ADD LEAD -->
    <div id="leadModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-3xl font-bold mb-8 italic tracking-tighter">New Contact</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-sm">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Full Name</label><input type="text" id="lName" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Phone</label><input type="text" id="lPhone" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Email</label><input type="email" id="lEmail" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Address</label><input type="text" id="lAddress" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Zip Code</label><input type="text" id="lZip" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">State</label>
                    <select id="lState" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option><option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option><option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option><option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option><option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option><option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option><option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option><option value="TX" selected>TX</option><option value="UT">UT</option><option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option><option value="WI">WI</option><option value="WY">WY</option>
                    </select>
                </div>
                <div class="md:col-span-2"><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Notes</label><textarea id="lNotes" class="w-full p-4 bg-slate-50 rounded-2xl outline-none h-24"></textarea></div>
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button onclick="window.closeModal('leadModal')" class="font-bold text-slate-400">CANCEL</button>
                <button id="saveLeadBtn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl">CREATE CONTACT</button>
            </div>
        </div>
    </div>

    <!-- MODAL TASK -->
    <div id="taskModal" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl">
            <h3 id="taskTitleHeader" class="text-2xl font-bold mb-6 italic">Task Details</h3>
            <input type="hidden" id="tEditId">
            <div class="space-y-4">
                <input type="text" id="tTitle" placeholder="Task description..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                <select id="tPriority" class="w-full p-4 bg-slate-50 rounded-2xl outline-none"><option value="Low">Low</option><option value="Medium" selected>Medium</option><option value="High">High 🔥</option></select>
                <select id="tLeadId" class="w-full p-4 bg-slate-50 rounded-2xl outline-none"></select>
                <input type="date" id="tDate" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button onclick="window.closeModal('taskModal')" class="font-bold text-slate-400">CLOSE</button>
                <button id="saveTaskBtn" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
